{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
    <title>PDF 참고자료</title>
    <style>
        :root {
            color-scheme: light;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        * {
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: #e9ecef;
            touch-action: manipulation;
        }
        body {
            overflow: auto;
        }
        .viewer-toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 52px;
            padding: 0.5rem;
            background: rgba(33, 37, 41, 0.94);
            color: #fff;
            backdrop-filter: blur(10px);
        }
        .viewer-toolbar button {
            min-width: 44px;
            min-height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 10px;
            background: #fff;
            color: #212529;
            font-size: 1.1rem;
            font-weight: 800;
            touch-action: manipulation;
        }
        #zoomLabel {
            min-width: 62px;
            text-align: center;
            font-weight: 700;
        }
        #viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            min-height: calc(100dvh - 52px);
            padding: 16px;
            touch-action: manipulation;
        }
        .pdf-page {
            display: block;
            max-width: none;
            background: #fff;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.2);
        }
        .viewer-message {
            margin: auto;
            padding: 1.25rem;
            border-radius: 14px;
            background: #fff;
            color: #495057;
            text-align: center;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>
<body>
    <div class="viewer-toolbar" aria-label="PDF 확대 및 축소">
        <button type="button" id="zoomOut" aria-label="축소">−</button>
        <span id="zoomLabel">100%</span>
        <button type="button" id="zoomIn" aria-label="확대">+</button>
        <button type="button" id="fitWidth" aria-label="너비에 맞춤">맞춤</button>
    </div>
    <main id="viewer">
        <div class="viewer-message" id="viewerMessage">
            {% if viewer_error %}{{ viewer_error }}{% else %}PDF를 불러오는 중입니다…{% endif %}
        </div>
    </main>

    {% if pdf_file_url %}
    {{ pdf_file_url|json_script:"pdf-file-url" }}
    <script type="module">
        import * as pdfjsLib from "{% static 'vendor/pdfjs/pdf.min.mjs' %}";

        pdfjsLib.GlobalWorkerOptions.workerSrc = "{% static 'vendor/pdfjs/pdf.worker.min.mjs' %}";

        const pdfUrl = JSON.parse(document.getElementById('pdf-file-url').textContent);
        const viewer = document.getElementById('viewer');
        const message = document.getElementById('viewerMessage');
        const zoomLabel = document.getElementById('zoomLabel');
        let pdfDocument = null;
        let scale = 1;
        let renderVersion = 0;

        function updateZoomLabel() {
            zoomLabel.textContent = `${Math.round(scale * 100)}%`;
        }

        async function renderDocument() {
            if (!pdfDocument) return;
            const currentVersion = ++renderVersion;
            viewer.replaceChildren();

            for (let pageNumber = 1; pageNumber <= pdfDocument.numPages; pageNumber += 1) {
                if (currentVersion !== renderVersion) return;

                const page = await pdfDocument.getPage(pageNumber);
                const viewport = page.getViewport({ scale });
                const outputScale = window.devicePixelRatio || 1;
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false });

                canvas.className = 'pdf-page';
                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = `${Math.floor(viewport.width)}px`;
                canvas.style.height = `${Math.floor(viewport.height)}px`;
                viewer.appendChild(canvas);

                await page.render({
                    canvasContext: context,
                    transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0],
                    viewport
                }).promise;
            }
        }

        async function fitToWidth() {
            if (!pdfDocument) return;
            const firstPage = await pdfDocument.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1 });
            scale = Math.max(0.5, Math.min(3, (viewer.clientWidth - 32) / viewport.width));
            updateZoomLabel();
            await renderDocument();
        }

        document.getElementById('zoomIn').addEventListener('click', async () => {
            scale = Math.min(3, scale + 0.25);
            updateZoomLabel();
            await renderDocument();
        });

        document.getElementById('zoomOut').addEventListener('click', async () => {
            scale = Math.max(0.5, scale - 0.25);
            updateZoomLabel();
            await renderDocument();
        });

        document.getElementById('fitWidth').addEventListener('click', fitToWidth);

        try {
            pdfDocument = await pdfjsLib.getDocument(pdfUrl).promise;
            message.remove();
            await fitToWidth();
        } catch (error) {
            viewer.replaceChildren(message);
            message.textContent = 'PDF를 불러오지 못했습니다. 파일을 다시 확인해 주세요.';
            console.error(error);
        }
    </script>
    {% endif %}
</body>
</html>
