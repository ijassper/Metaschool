<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생답안지 출력 - {{ activity.title }}</title>
    <!-- PDF 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 1. 기본 배경 및 폰트 설정 (맑은 고딕) */
        body { 
            margin: 0; padding: 0; 
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; 
            background-color: #525659; /* 화면 볼 때는 어두운 배경 */
        }

        /* 2. 상단 버튼 바 (PDF에 안 나오도록 설정) */
        .no-print-bar { 
            position: sticky; top: 0; background: white; padding: 12px; 
            z-index: 1000; display: flex; justify-content: center; gap: 15px; 
            border-bottom: 2px solid #333; 
        }
        .btn-action { 
            border: none; padding: 10px 25px; border-radius: 8px; 
            font-weight: bold; cursor: pointer; color: white; font-size: 14px;
        }

        /* 3. 화면 미리보기용 A4 스타일 (웹 화면에서만 적용) */
        @media screen {
            #pdfArea { padding: 20px 0; }
            .print-page {
                width: 210mm;
                margin: 0 auto 30px auto; /* 페이지 간 간격 */
                box-shadow: 0 0 15px rgba(0,0,0,0.5);
            }
        }

        /* 4. 실제 종이 영역 (A4 규격 강제 고정) */
        .print-page {
            background-color: white !important;
            width: 210mm;
            min-height: 296mm; /* 297보다 살짝 작게 하여 다음 장 밀림 방지 */
            padding: 15mm; /* 여백 조정 */
            box-sizing: border-box;
            position: relative;
            page-break-after: always; /* 페이지 나눔 강제 */
        }

        /* 5. 테이블 디자인 (선명한 테두리 및 너비 고정) */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; /* 맑은 고딕 밀림 방지 */
        }
        td { 
            border: 1px solid #000; 
            padding: 10px 8px; 
            text-align: center; 
            font-size: 10pt; /* 10포인트 적용 */
            height: 45px;
            word-break: break-all;
        }
        .header-bg { background-color: #f2f2f2 !important; font-weight: bold; width: 20%; }

        /* 6. 답안 영역 (내용이 길어도 1페이지 틀 유지 또는 자동 넘김) */
        .answer-box { 
            min-height: 200mm; /* 최소 20cm 높이 확보 */
            vertical-align: top; 
            text-align: left; 
            padding: 15px; 
            line-height: 1.7; 
        }

        /* 7. 출력 시 불필요 요소 제거 */
        @media print {
            body { background: white !important; }
            .print-page { margin: 0 !important; box-shadow: none !important; width: 100% !important; }
            .no-print-bar { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- 버튼 영역 -->
    <div class="no-print-bar">
        <button onclick="downloadAsPDF()" class="btn-action" style="background-color: #FF80B5;">PDF 다운로드</button>
        <button onclick="window.print()" class="btn-action" style="background-color: #8E44AD;">PDF 인쇄하기</button>
    </div>

    <!-- PDF 캡처 대상 -->
    <div id="pdfArea">
        {% for s in students %}
        <div class="print-page">
            <table>
                <colgroup>
                    <col style="width: 20%;">
                    <col style="width: 30%;">
                    <col style="width: 20%;">
                    <col style="width: 30%;">
                </colgroup>
                <tr>
                    <td class="header-bg">응시 과목</td>
                    <td>{{ activity.section }}</td>
                    <td class="header-bg">평가명</td>
                    <td>{{ activity.title }}</td>
                </tr>
                <tr>
                    <td class="header-bg">응시자 정보</td>
                    <td>{{ s.grade }}학년 {{ s.class_no }}반 {{ s.number }}번 {{ s.name }}</td>
                    <td class="header-bg">응시 일시</td>
                    <td>{{ s.my_answer.submitted_at|date:"Y-m-d H:i"|default:"-" }}</td>
                </tr>
                <tr>
                    <td colspan="4" class="header-bg">학생 답안</td>
                </tr>
                <tr>
                    <td colspan="4" class="answer-box">
                        {{ s.my_answer.content|linebreaksbr|default:"(미제출)" }}
                    </td>
                </tr>
            </table>
        </div>
        {% endfor %}
    </div>

    <script>
        /**
         * [최종 해결책] 
         * html2pdf가 페이지를 오판하지 않도록 '가상 윈도우 너비'를 
         * A4 사이즈에 딱 맞춰서 캡처하는 로직입니다.
         */
        function downloadAsPDF() {
            const element = document.getElementById('pdfArea');
            const btn = event.currentTarget;
            btn.innerText = "⏳ PDF 변환 중...";
            btn.disabled = true;

            const options = {
                margin: 0,
                filename: '학생답안지_{{ activity.title }}.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0,
                    // [핵심] 캡처용 가상 해상도를 800px로 고정하여 
                    // 화면 좌우 여백이 PDF에 포함되지 않게 합니다.
                    windowWidth: 800 
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                // [핵심] 오직 CSS의 .print-page 단위로만 페이지를 나누게 함
                pagebreak: { mode: ['css'], before: '.print-page' } 
            };

            html2pdf().set(options).from(element).save().then(() => {
                btn.innerText = "PDF 다운로드";
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
