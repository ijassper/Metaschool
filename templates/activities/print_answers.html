<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생답안지 출력</title>
    <style>
        /* 1. 가장 깔끔하고 안정적인 인쇄용 스타일 */
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #f0f2f5; }

        .no-print-bar { 
            position: sticky; top: 0; background: white; padding: 15px; 
            z-index: 1000; display: flex; justify-content: center; border-bottom: 1px solid #ddd; 
        }
        .btn-main { 
            background-color: #8E44AD; color: white; border: none; 
            padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px;
            box-shadow: 0 4px 15px rgba(142, 68, 173, 0.3);
        }

        .print-page {
            background-color: white !important;
            width: 210mm;
            min-height: 290mm;
            padding: 20mm;
            margin: 30px auto;
            box-sizing: border-box;
            page-break-after: always;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1.5px solid #000; }
        td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 10pt; }
        .header-bg { background-color: #f2f2f2 !important; font-weight: bold; -webkit-print-color-adjust: exact; }
        .answer-box { min-height: 200mm; vertical-align: top; text-align: left; padding: 15px; line-height: 1.7; }

        @media print {
            body { background: white !important; }
            .no-print-bar { display: none !important; }
            .print-page { margin: 0 !important; box-shadow: none !important; width: 100% !important; }
        }
    </style>
</head>
<body>
    <!-- 버튼 하나로 통일: 브라우저가 제공하는 가장 완벽한 PDF 저장 기능을 씁니다 -->
    <div class="no-print-bar">
        <button onclick="window.print()" class="btn-main">
            🖨️ PDF 저장 및 인쇄하기 (Ctrl+P)
        </button>
    </div>

    <div id="pdfArea">
        {% for s in students %}
        <div class="print-page">
            <table>
                <colgroup><col style="width: 20%;"><col style="width: 30%;"><col style="width: 20%;"><col style="width: 30%;"></colgroup>
                <tr><td class="header-bg">응시 과목</td><td>{{ activity.section }}</td><td class="header-bg">평가명</td><td>{{ activity.title }}</td></tr>
                <tr><td class="header-bg">응시자 정보</td><td>{{ s.grade }}학년 {{ s.class_no }}반 {{ s.number }}번 {{ s.name }}</td><td class="header-bg">응시 일시</td><td>{{ s.my_answer.submitted_at|date:"Y-m-d H:i"|default:"-" }}</td></tr>
                <tr><td colspan="4" class="header-bg">학생 답안</td></tr>
                <tr><td colspan="4" class="answer-box">{{ s.my_answer.content|linebreaksbr|default:"(미제출)" }}</td></tr>
            </table>
        </div>
        {% endfor %}
    </div>
</body>
</html>
