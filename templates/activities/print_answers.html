<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생답안지 출력</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 1. 공통 설정 */
        body { margin: 0; padding: 0; font-family: 'Pretendard', '함초롬바탕', sans-serif; background-color: #f0f2f5; }

        /* 2. 화면(Web)에서만 보이는 디자인 */
        @media screen {
            .page-wrapper {
                background-color: #f0f2f5; /* 배경 회색 */
                padding: 30px 0;
            }
            .print-page {
                width: 210mm;
                margin: 0 auto; /* 가운데 정렬 */
                box-shadow: 0 0 20px rgba(0,0,0,0.1); /* 그림자 */
            }
        }

        /* 3. 실제 출력/PDF 영역 (순수 종이 규격) */
        .print-page {
            width: 210mm;
            height: 296mm; /* 297mm보다 살짝 작게 해서 다음 장 넘김 방지 */
            padding: 20mm;
            box-sizing: border-box;
            background-color: white !important;
            position: relative;
            overflow: hidden;
            page-break-after: always;
        }

        /* 4. 테이블 고정 디자인 (들쑥날쑥 방지) */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; font-size: 11pt; height: 40px; }
        .header-bg { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; font-weight: bold; width: 20%; }

        /* 답안 영역 높이 고정 */
        .answer-box { 
            height: 750px; /* 인쇄 미리보기와 동일하게 맞춤 */
            vertical-align: top; text-align: left; padding: 20px; line-height: 1.8; word-break: break-all; 
        }

        /* 버튼 바 */
        .no-print-bar { position: sticky; top: 0; background: white; padding: 15px; z-index: 1000; display: flex; justify-content: center; gap: 15px; border-bottom: 1px solid #ddd; }
        .btn-action { border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="no-print-bar">
        <button onclick="downloadAsPDF()" class="btn-action" style="background-color: #FF80B5;">PDF 다운로드</button>
        <button onclick="window.print()" class="btn-action" style="background-color: #8E44AD;">PDF 인쇄하기</button>
    </div>

    <!-- PDFArea: 이 내부의 것만 캡처합니다 -->
    <div id="pdfArea">
        {% for s in students %}
        <div class="page-wrapper">
            <div class="print-page">
                <table>
                    <tr>
                        <td class="header-bg">응시 과목</td><td>{{ activity.section }}</td>
                        <td class="header-bg">평가명</td><td>{{ activity.title }}</td>
                    </tr>
                    <tr>
                        <td class="header-bg">응시자 정보</td>
                        <td>{{ s.grade }}학년 {{ s.class_no }}반 {{ s.number }}번 {{ s.name }}</td>
                        <td class="header-bg">응시 일시</td>
                        <td>{{ s.my_answer.submitted_at|date:"Y-m-d H:i"|default:"-" }}</td>
                    </tr>
                    <tr>
                        <td colspan="4" class="header-bg">학생 답안</td>
                    </tr>
                    <tr>
                        <td colspan="4" class="answer-box">
                            {{ s.my_answer.content|linebreaksbr|default:"(미제출)" }}
                        </td>
                    </tr>
                </table>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        function downloadAsPDF() {
            // 캡처할 대상 (전체 영역이 아닌 개별 페이지들의 부모)
            const element = document.getElementById('pdfArea');
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;

            btn.innerText = "⏳ PDF 최적화 및 생성 중...";
            btn.disabled = true;

            // [핵심] html2pdf 설정
            const options = {
                margin: 0,
                filename: '학생답안지_{{ activity.title }}.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2,           // 선명도
                    useCORS: true,      // 이미지 등 외부 리소스 허용
                    scrollY: 0,         // 스크롤 위치 무시 (백지 방지 핵심)
                    windowWidth: 800,   // [중요] 캡처하는 가상 창의 너비를 좁게 잡아 여백을 강제 제거
                    removeContainer: true
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                // [중요] .print-page 클래스 단위로만 페이지를 자르도록 명령
                pagebreak: { mode: ['css', 'legacy'], before: '.print-page' }
            };

            // 실행
            html2pdf().set(options).from(element).save().then(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                alert("PDF 생성 중 오류가 발생했습니다.");
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
