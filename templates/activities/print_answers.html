<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        /* 인쇄 시 여백 강제 제거 및 A4 설정 */
        @page { size: A4; margin: 0; }
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #525659; }

        /* 화면에서 볼 때: 종이가 회색 배경 위에 떠 있는 느낌 */
        @media screen {
            .pdf-container { padding: 40px 0; }
            .print-page {
                width: 210mm;
                margin: 0 auto 30px auto;
                box-shadow: 0 0 20px rgba(0,0,0,0.5);
            }
        }

        /* 공통 종이 스타일 */
        .print-page {
            background-color: white !important;
            width: 210mm;
            height: 297mm; /* 정사이즈 */
            padding: 20mm;
            box-sizing: border-box;
            page-break-after: always;
            position: relative;
        }

        /* 상단 버튼 바 */
        .no-print-bar { 
            position: sticky; top: 0; background: white; padding: 15px; 
            z-index: 1000; display: flex; justify-content: center; border-bottom: 1px solid #ddd; 
        }
        .btn-print { 
            background: #8E44AD; color: white; border: none; padding: 12px 35px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px;
        }

        /* 테이블 디자인 */
        table { width: 100%; height: 255mm; border-collapse: collapse; table-layout: fixed; border: 1.5px solid #000; }
        td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 10pt; }
        .header-bg { background-color: #f2f2f2 !important; font-weight: bold; -webkit-print-color-adjust: exact; }
        .answer-box { vertical-align: top; text-align: left; padding: 15px; line-height: 1.8; }

        @media print {
            .no-print-bar { display: none !important; }
            .pdf-container { padding: 0 !important; }
            .print-page { margin: 0 !important; box-shadow: none !important; width: 100% !important; }
        }
    </style>
</head>
<body>
    <div class="no-print-bar">
        <button onclick="window.print()" class="btn-print">🖨️ PDF 저장 또는 인쇄 (Ctrl+P)</button>
    </div>

    <div class="pdf-container">
        {% for s in students %}
        <div class="print-page">
            <table>
                <colgroup><col style="width:20%"><col style="width:30%"><col style="width:20%"><col style="width:30%"></colgroup>
                <tr><td class="header-bg">응시 과목</td><td>{{ activity.section }}</td><td class="header-bg">평가명</td><td>{{ activity.title }}</td></tr>
                <tr><td class="header-bg">응시자 정보</td><td>{{ s.grade }}학년 {{ s.class_no }}반 {{ s.number }}번 {{ s.name }}</td><td class="header-bg">응시 일시</td><td>{{ s.my_answer.submitted_at|date:"Y-m-d H:i"|default:"-" }}</td></tr>
                <tr><td colspan="4" class="header-bg">학생 답안</td></tr>
                <tr><td colspan="4" class="answer-box">{{ s.my_answer.content|linebreaksbr|default:"(미제출)" }}</td></tr>
            </table>
        </div>
        {% endfor %}
    </div>
</body>
</html>
