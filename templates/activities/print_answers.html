{% load tz %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ pdf_filename }}</title>
    <style>
        @font-face {
            font-family: 'Noto Sans KR';
            src: local('Noto Sans KR'), local('NotoSansKR');
        }
        @font-face {
            font-family: 'Nanum Gothic';
            src: local('Nanum Gothic'), local('NanumGothic');
        }
        @font-face {
            font-family: 'Malgun Gothic';
            src: local('Malgun Gothic'), local('맑은 고딕');
        }

        @page {
            size: A4;
            margin: 12mm;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', 'Nanum Gothic', 'Malgun Gothic', sans-serif;
            background: #3b3f46;
            color: #111;
            line-height: 1.55;
        }

        .no-print-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(14px);
        }

        .btn-print {
            border: 0;
            border-radius: 10px;
            padding: 12px 30px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            background: #8E44AD;
        }

        #pdfArea {
            padding-top: 4px;
        }

        .print-page {
            width: 210mm;
            min-height: 297mm;
            margin: 20px auto 28px;
            padding: 15mm 15mm 10mm;
            background: #fff;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
            page-break-after: always;
            break-after: page;
            page-break-inside: auto;
            break-inside: auto;
        }

        .print-title {
            margin: 0 0 12px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.18em;
        }

        .student-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 1.5rem;
            padding: 14px 18px;
            border: 1px solid #dee2e6;
            border-radius: 16px;
            background-color: #f8f9fa;
            font-size: 10pt;
            page-break-inside: avoid;
            break-inside: avoid;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .student-meta-left,
        .student-meta-right {
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.5;
            min-width: 0;
        }

        .student-meta-left {
            color: #6c757d;
            flex: 0 0 auto;
        }

        .student-meta-right {
            justify-content: flex-end;
            text-align: right;
            font-weight: 700;
            flex: 1 1 auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .student-meta-label {
            font-weight: 700;
            color: #495057;
        }

        .student-meta-divider {
            color: #adb5bd;
            margin: 0 4px;
        }

        .print-section {
            margin-bottom: 16px;
            page-break-inside: auto;
            break-inside: auto;
        }

        .print-section-title {
            margin: 0 0 8px;
            font-size: 11pt;
            font-weight: 700;
        }

        .text-secondary {
            color: #6c757d !important;
        }

        .bg-gray-50,
        .print-question-panel {
            background-color: #f9fafb !important;
            border: 1px solid #e9ecef;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .rounded-xl {
            border-radius: 12px !important;
        }

        .p-4 {
            padding: 16px !important;
        }

        .print-question {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            font-size: 9pt;
            font-weight: normal;
            color: #212529;
            line-height: 1.55;
        }

        .print-box {
            min-height: 0;
            padding: 16px;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            background: #fff;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            font-size: 10pt;
            line-height: 1.65;
            page-break-inside: auto;
            break-inside: auto;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            orphans: 3;
            widows: 3;
        }

        .print-box::before,
        .print-box::after {
            content: "";
            display: block;
            height: 0;
        }

        .text-gray-400 {
            color: #9ca3af !important;
        }

        .italic {
            font-style: italic !important;
        }

        .font-medium {
            font-weight: 500 !important;
        }

        .answer-title,
        .print-answer-title {
            margin: 0 0 0.35rem;
            font-weight: 700;
            line-height: 1.45;
        }

        .answer-text + .answer-title,
        .print-answer-text + .print-answer-title {
            margin-top: 1rem;
        }

        .answer-text,
        .print-answer-text {
            white-space: pre-wrap;
        }

        @media print {
            body {
                background: #fff !important;
            }

            .no-print-bar {
                display: none !important;
            }

            #pdfArea {
                padding-top: 0 !important;
            }

            .print-page {
                width: auto;
                min-height: auto;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                page-break-after: always !important;
                break-after: page !important;
            }

            .student-meta {
                display: flex !important;
                justify-content: space-between !important;
                align-items: flex-start !important;
                flex-direction: row !important;
            }

            .student-meta-left,
            .student-meta-right {
                display: flex !important;
                align-items: center !important;
            }

            .student-meta-right {
                justify-content: flex-end !important;
                text-align: right !important;
                white-space: nowrap !important;
            }

            .print-question-panel,
            .print-box {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .print-section,
            .print-box {
                page-break-inside: auto !important;
                break-inside: auto !important;
            }
        }
    </style>
</head>
<body data-print-title="{% if students|length == 1 %}[{{ activity.title }}] {{ students.0.grade }}학년{{ students.0.class_no }}반 {{ students.0.name }}{% else %}[{{ activity.title }}] {% if students %}{{ students.0.grade }}학년{{ students.0.class_no }}반{% else %}전체학급{% endif %}{% endif %}">

    <div class="no-print-bar">
        <button onclick="window.print()" class="btn-print">PDF 인쇄</button>
    </div>

    <div id="pdfArea">
        {% for s in students %}
            {% include 'components/answer_sheet_print.html' %}
        {% endfor %}
    </div>

    <script>
        function splitAnswerTitles(container) {
            const normalizedContent = (container.textContent || '').replace(/\r\n?/g, '\n');
            container.replaceChildren();

            if (!normalizedContent.trim()) {
                const emptyEl = document.createElement('div');
                emptyEl.className = 'answer-text text-gray-400 italic font-medium';
                emptyEl.textContent = '백지 제출';
                container.appendChild(emptyEl);
                return;
            }

            const lines = normalizedContent.split('\n');
            let textLines = [];
            let questionCounter = 0;
            let hasHeader = false;

            const appendText = () => {
                const text = textLines.join('\n').replace(/^\n+|\n+$/g, '');
                textLines = [];

                if (hasHeader) {
                    const textElement = document.createElement('div');
                    if (!text.trim()) {
                        textElement.className = 'answer-text text-gray-400 italic font-medium';
                        textElement.textContent = '백지 제출';
                    } else {
                        textElement.className = 'answer-text';
                        textElement.textContent = text;
                    }
                    container.appendChild(textElement);
                } else if (text.trim()) {
                    const textElement = document.createElement('div');
                    textElement.className = 'answer-text';
                    textElement.textContent = text;
                    container.appendChild(textElement);
                }
            };

            lines.forEach((line) => {
                const titleMatch = line.match(/^\s*\[([^\]]*)\]\s*$/);
                if (!titleMatch) {
                    textLines.push(line);
                    return;
                }

                appendText();
                const title = titleMatch[1].trim();
                if (!title) return;

                hasHeader = true;
                questionCounter++;
                const titleElement = document.createElement('div');
                titleElement.className = 'answer-title font-bold fw-bold';
                titleElement.textContent = `문항 ${questionCounter}. ${title}`;
                container.appendChild(titleElement);
            });

            appendText();
        }

        document.querySelectorAll('[data-format-answer-titles]').forEach(splitAnswerTitles);
    </script>

</body>
</html>
