<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생답안지 출력</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 1. 공통 폰트 및 초기화 */
        body { margin: 0; padding: 0; font-family: 'Pretendard', '함초롬바탕', serif; background-color: #f0f2f5; }

        /* 2. 화면 미리보기용 (좌우 여백) */
        @media screen {
            .page-wrapper {
                width: 210mm;
                margin: 30px auto;
                background-color: white;
                box-shadow: 0 0 20px rgba(0,0,0,0.1);
                box-sizing: border-box;
            }
        }

        /* 3. A4 한 페이지 규격 강제 고정 (가장 중요) */
        .print-page {
            width: 210mm;
            height: 296mm; /* 297mm보다 살짝 작게 하여 빈 페이지 생성을 방지 */
            padding: 20mm;
            box-sizing: border-box;
            background-color: white;
            position: relative;
            overflow: hidden; /* 내용이 넘쳐서 다음 페이지를 만드는 것 방지 */
            page-break-after: always; /* 인쇄 시 페이지 나눔 */
        }

        /* 4. 테이블 디자인 (들쑥날쑥 현상 해결) */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; /* 열 너비 고정 */
        }
        th, td { border: 1px solid black; padding: 8px; text-align: center; font-size: 11pt; height: 40px; }
        .header-bg { background-color: #f2f2f2; font-weight: bold; width: 20%; }

        /* [핵심] 답안 영역 높이 강제 고정 (스크린샷 양식 재현) */
        .answer-box { 
            height: 780px; /* A4 하단까지 꽉 채우는 고정 높이 */
            vertical-align: top; 
            text-align: left; 
            padding: 20px; 
            line-height: 1.8; 
            word-break: break-all;
        }

        /* 상단 버튼 바 */
        .no-print-bar { 
            position: sticky; top: 0; background: white; padding: 15px; 
            z-index: 1000; display: flex; justify-content: center; gap: 15px; 
            border-bottom: 1px solid #ddd; 
        }
        .btn-action { border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; }

        @media print {
            body { background: white; }
            .page-wrapper { margin: 0; box-shadow: none; width: 100%; }
            .no-print-bar { display: none; }
        }
    </style>
</head>
<body>

    <div class="no-print-bar">
        <button onclick="downloadAsPDF()" class="btn-action" style="background-color: #FF80B5;">PDF 다운로드</button>
        <button onclick="window.print()" class="btn-action" style="background-color: #8E44AD;">PDF 인쇄하기</button>
    </div>

    <!-- PDFArea: 이 내부의 것만 캡처합니다 -->
    <div id="pdfArea">
        {% for s in students %}
        <div class="page-wrapper">
            <div class="print-page">
                <table>
                    <tr>
                        <td class="header-bg">응시 과목</td><td>{{ activity.section }}</td>
                        <td class="header-bg">평가명</td><td>{{ activity.title }}</td>
                    </tr>
                    <tr>
                        <td class="header-bg">응시자 정보</td>
                        <td>{{ s.grade }}학년 {{ s.class_no }}반 {{ s.number }}번 {{ s.name }}</td>
                        <td class="header-bg">응시 일시</td>
                        <td>{{ s.my_answer.submitted_at|date:"Y-m-d H:i"|default:"-" }}</td>
                    </tr>
                    <tr>
                        <td colspan="4" class="header-bg">학생 답안</td>
                    </tr>
                    <tr>
                        <td colspan="4" class="answer-box">
                            {{ s.my_answer.content|linebreaksbr|default:"(미제출)" }}
                        </td>
                    </tr>
                </table>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        function downloadAsPDF() {
            const element = document.getElementById('pdfArea');
            const btn = event.currentTarget;
            btn.innerText = "⏳ PDF 생성 중...";
            btn.disabled = true;

            const options = {
                margin: 0,
                filename: '학생답안지_{{ activity.title }}.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    logging: false,
                    scrollY: 0
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                // [수정] 아래 설정을 통해 56페이지(중복) 문제를 해결합니다.
                pagebreak: { mode: 'css', before: '.page-wrapper' }
            };

            html2pdf().set(options).from(element).save().then(() => {
                btn.innerText = "PDF로 즉시 다운로드";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
