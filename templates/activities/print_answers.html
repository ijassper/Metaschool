<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 1. 맑은 고딕 최적화 초기화 */
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: #525659; }

        /* 2. 상단 버튼 바 */
        .no-print-bar { 
            position: sticky; top: 0; background: white; padding: 12px; 
            z-index: 1000; display: flex; justify-content: center; gap: 15px; 
            border-bottom: 1px solid #333; 
        }
        .btn-action { border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }

        /* 3. A4 용지 규격 (mm 고정) */
        .print-page {
            width: 210mm;
            height: 296.5mm; /* 빈 페이지 방지를 위해 0.5mm 여유 */
            padding: 20mm;
            margin: 20px auto;
            background-color: white !important;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            page-break-after: always;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* 4. 테이블 디자인 - 너비 고정 로직 */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; /* 너비 고정 필수 */
            word-break: break-all;
        }
        th, td { 
            border: 1.5px solid black; 
            padding: 10px 5px; 
            text-align: center; 
            font-size: 10.5pt; /* 맑은 고딕 크기 미세 조정 */
            line-height: 1.4;
        }
        .header-bg { 
            background-color: #f2f2f2 !important; 
            font-weight: bold; 
        }

        /* 5. 답안 영역 높이 제한 (mm) */
        .answer-box { 
            height: 205mm !important; 
            vertical-align: top; 
            text-align: left; 
            padding: 15mm 10mm; 
            line-height: 1.8; 
        }

        @media print {
            body { background: white; }
            .print-page { margin: 0 !important; box-shadow: none !important; }
            .no-print-bar { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="no-print-bar">
        <!-- 버튼 명칭 수정 -->
        <button onclick="downloadAsPDF()" class="btn-action" style="background-color: #FF80B5;">PDF 다운로드</button>
        <button onclick="window.print()" class="btn-action" style="background-color: #8E44AD;">PDF 인쇄하기</button>
    </div>

    <div id="pdfArea">
        {% for s in students %}
        <div class="print-page">
            <table>
                <!-- [수정] 맑은 고딕 글씨 밀림 방지를 위한 너비 강제 할당 -->
                <colgroup>
                    <col style="width: 18%;"> <!-- 라벨1 -->
                    <col style="width: 32%;"> <!-- 내용1 -->
                    <col style="width: 18%;"> <!-- 라벨2 -->
                    <col style="width: 32%;"> <!-- 내용2 -->
                </colgroup>
                <tr>
                    <td class="header-bg">응시 과목</td>
                    <td>{{ activity.section }}</td>
                    <td class="header-bg">평가명</td>
                    <td>{{ activity.title }}</td>
                </tr>
                <tr>
                    <td class="header-bg">응시자 정보</td>
                    <td style="font-size: 9.5pt;">{{ s.grade }}학년 {{ s.class_no }}반 {{ s.number }}번 {{ s.name }}</td>
                    <td class="header-bg">응시 일시</td>
                    <td style="font-size: 9.5pt;">{{ s.my_answer.submitted_at|date:"Y-m-d H:i"|default:"-" }}</td>
                </tr>
                <tr>
                    <!-- [수정] 괄호 제목 삭제 -->
                    <td colspan="4" class="header-bg" style="font-size: 11pt; letter-spacing: 5px;">학생 답안</td>
                </tr>
                <tr>
                    <td colspan="4" class="answer-box">
                        {{ s.my_answer.content|linebreaksbr|default:"(미제출)" }}
                    </td>
                </tr>
            </table>
        </div>
        {% endfor %}
    </div>

    <script>
        function downloadAsPDF() {
            const element = document.getElementById('pdfArea');
            const btn = event.currentTarget;
            btn.innerText = "⏳ 생성 중...";
            btn.disabled = true;

            const options = {
                margin: 0,
                filename: '학생답안지_{{ activity.title }}.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0,
                    windowWidth: 1000 
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: 'avoid-all' } 
            };

            html2pdf().set(options).from(element).save().then(() => {
                btn.innerText = "PDF 다운로드";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
