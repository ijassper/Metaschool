<!-- 학생 선택 모달 (글로벌 공유) -->
<style>
    /* ===== 학생 선택 모달 전용 그리드 스타일 ===== */
    /* 공통 Wrapper 설정 (카드 모양 유지) */
    /* 학년 영역 안에 있는 반 영역은 항상 흰색 배경 유지 */
    .grade-section .mb-3.class-section {
        background-color: #ffffff !important;
        border-radius: 15px !important;
        padding: 10px;
    }
    .class-group-wrapper {
        border-left: 5px solid transparent; 
        border-top: 1px solid #eee;
        border-right: 1px solid #eee;
        border-bottom: 1px solid #eee;
        background-color: #ffffff; /* 기본은 깔끔한 흰색 */
        border-radius: 0 24px 24px 0; /* 우측만 둥글게 하거나 전체 24px */
        transition: all 0.3s ease;
    }
    /* 파스텔 배경색 정의 */
        .pastel-purple { background-color: #E9E2FF !important; border: 1px solid #D1C4E9 !important; }
        .pastel-blue   { background-color: #DDEBFF !important; border: 1px solid #BBDEFB !important; }
        .pastel-green  { background-color: #D3F9E8 !important; border: 1px solid #B2EBF2 !important; }
        .pastel-yellow { background-color: #FFF3BF !important; border: 1px solid #FFE082 !important; }
        .pastel-orange { background-color: #FFE8CC !important; border: 1px solid #FFCCBC !important; }
        .pastel-red    { background-color: #FFE3E3 !important; border: 1px solid #FFCDD2 !important; }
        .pastel-pink   { background-color: #FFDEEB !important; border: 1px solid #F8BBD0 !important; }
    /* 학생 명단: 5열 세로 흐름 배치 (CSS Columns) */
    .student-grid-container {
        column-count: 5;
        column-gap: 1rem;
        column-rule: 1px solid #eee;
    }
    /* 반응형: 화면이 좁아질 때 열 수 축소 */
    @media (max-width: 1200px) {
        .student-grid-container { column-count: 4; }
    }
    @media (max-width: 992px) {
        .student-grid-container { column-count: 3; }
    }
    @media (max-width: 576px) {
        .student-grid-container { column-count: 2; }
    }
    /* 학생 아이템: 열 경계에서 잘리지 않게 */
    #studentSelectModal .student-item {
        break-inside: avoid;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        margin-bottom: 0.4rem;
        padding: 2px 4px;
        border-radius: 6px;
        transition: background 0.15s;
    }
    #studentSelectModal .student-item:hover {
        background: rgba(142, 68, 173, 0.06);
    }
    /* form-check 정렬 보정 */
    #studentSelectModal .student-item.form-check {
        padding-left: 0;
    }
    #studentSelectModal .student-item .form-check-input {
        flex-shrink: 0;
        margin-top: 0;
    }
    /* 접기/펼치기 버튼 */
    #studentSelectModal .toggle-btn {
        cursor: pointer;
        transition: background-color 0.2s;
    }
    #studentSelectModal .toggle-btn:hover {
        background-color: #f8f9fa;
        border-radius: 4px;
    }
</style>
<div class="modal fade" id="studentSelectModal" tabindex="-1" aria-labelledby="studentSelectModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content rounded-5" style="background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);">
            <div class="modal-header border-0 bg-white">
                <h5 class="modal-title fw-bold" id="studentSelectModalLabel" style="color: #8E44AD;">
                    <i class="bi bi-people-fill me-2" style="color: #8E44AD;"></i>{{ modal_title|default:"평가 대상 선택" }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <!-- 전체 선택/해제 -->
                <div class="d-flex gap-2 mb-4 border-bottom pb-3">
                    <button type="button" class="btn btn-sm btn-outline-primary w-50 fw-bold" onclick="toggleAllStudents(true)">
                        <i class="bi bi-check-all"></i> 전교생 선택
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-secondary w-50" onclick="toggleAllStudents(false)">
                        <i class="bi bi-x-circle"></i> 선택 해제
                    </button>
                </div>
                <!-- 실시간 검색바 추가 -->
                <div class="mb-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 rounded-start-pill">
                            <i class="bi bi-search text-muted"></i>
                        </span>
                        <input type="text" id="modalStudentSearch" class="form-control border-start-0 rounded-end-pill" placeholder="학년, 반, 또는 학생 이름 검색..." style="box-shadow: none;">
                    </div>
                </div>

                <!-- 학생 트리 구조 -->
                {% for grade_info in student_tree %}
                <div class="mb-3 border rounded p-3 grade-section">
                    <!-- 학년 -->
                    <div class="d-flex align-items-center justify-content-between">
                        <div class="form-check fw-bold text-primary mb-0">
                            <input class="form-check-input parent-check" type="checkbox" id="g_{{ grade_info.grade }}" 
                                onchange="toggleGroup(this, '.group-g-{{ grade_info.grade }}')">
                            <label class="form-check-label" for="g_{{ grade_info.grade }}">
                                {{ grade_info.grade }}학년
                            </label>
                        </div>
                        <i class="bi bi-caret-down-fill text-muted toggle-btn p-1" 
                           data-bs-toggle="collapse" data-bs-target="#collapse-grade-{{ grade_info.grade }}"></i>
                    </div>
                    
                    <div class="collapse show ms-2 mt-2 border-top pt-2" id="collapse-grade-{{ grade_info.grade }}">
                        {% for class_info in grade_info.classes %}
                        <div class="mb-3 class-section class-group-wrapper">
                            <!-- 반 -->
                            <div class="class-group-header d-flex align-items-center justify-content-between mb-2">
                                <div class="form-check fw-bold text-dark mb-0">
                                    <input class="form-check-input group-check group-g-{{ grade_info.grade }}" 
                                        type="checkbox" id="c_{{ grade_info.grade }}_{{ class_info.class_no }}"
                                        onchange="toggleGroup(this, '.child-c-{{ grade_info.grade }}-{{ class_info.class_no }}')">
                                    <label class="form-check-label" for="c_{{ grade_info.grade }}_{{ class_info.class_no }}">
                                        {{ class_info.class_no }}반 ({{ class_info.students|length }}명)
                                    </label>
                                </div>
                                <i class="bi bi-caret-down text-muted toggle-btn p-1" 
                                   data-bs-toggle="collapse" data-bs-target="#collapse-class-{{ grade_info.grade }}-{{ class_info.class_no }}"></i>
                            </div>

                            <!-- 학생 명단 -->
                            <div class="collapse show ps-2" id="collapse-class-{{ grade_info.grade }}-{{ class_info.class_no }}">
                                <div class="student-grid-container p-5">
                                    {% for s in class_info.students %}
                                    <div class="student-item form-check">
                                        <!-- name="target_students"는 View에서 받을 이름 -->
                                        <input class="form-check-input student-check child-c-{{ grade_info.grade }}-{{ class_info.class_no }} group-g-{{ grade_info.grade }}" 
                                            type="checkbox" name="target_students" value="{{ s.id }}" id="s_{{ s.id }}"
                                            onchange="updateSummary()"
                                            {% if s.id|stringformat:"s" in current_targets %}checked{% endif %}>
                                        <label class="form-check-label small text-secondary" for="s_{{ s.id }}">
                                            <span class="fw-bold text-dark">{{ s.number|stringformat:"02d" }}</span> {{ s.name }}
                                        </label>
                                    </div>
                                    {% endfor %}
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="modal-footer border-0 bg-white">
                <button type="button" class="btn btn-success btn-lg rounded-pill px-4 fw-bold" onclick="completeStudentSelection()" data-bs-dismiss="modal">
                    <i class="bi bi-check-circle me-2"></i>선택 완료
                </button>
            </div>
        </div>
    </div>
</div>

<!-- [Script] 학생 선택 모달 제어 로직 -->
<script>
    // 모든 학생 선택/해제
    function toggleAllStudents(select) {
        const checkboxes = document.querySelectorAll('input[name="target_students"]');
        checkboxes.forEach(cb => {
            cb.checked = select;
        });
        updateSummary();
        updateParentCheckboxes();
    }

    // 그룹 토글 (학년/반 단위)
    function toggleGroup(parentCheckbox, childSelector) {
        const children = document.querySelectorAll(childSelector);
        children.forEach(child => {
            child.checked = parentCheckbox.checked;
        });
        updateSummary();
        updateParentCheckboxes();
    }

    // 상위 체크박스 상태 업데이트
    function updateParentCheckboxes() {
        // 반 단위 체크박스 업데이트
        document.querySelectorAll('.group-check').forEach(groupCb => {
            const targetClass = groupCb.getAttribute('onchange').match(/'([^']+)'/)[1];
            const children = document.querySelectorAll(targetClass);
            const checkedChildren = document.querySelectorAll(targetClass + ':checked');
            groupCb.checked = children.length > 0 && children.length === checkedChildren.length;
        });

        // 학년 단위 체크박스 업데이트
        document.querySelectorAll('.parent-check').forEach(parentCb => {
            const targetGrade = parentCb.getAttribute('onchange').match(/'([^']+)'/)[1];
            const children = document.querySelectorAll(targetGrade);
            const checkedChildren = document.querySelectorAll(targetGrade + ':checked');
            parentCb.checked = children.length > 0 && children.length === checkedChildren.length;
        });
    }

    // 선택 요약 업데이트 (상단 버튼 + 하단 메인 버튼 동기화)
    function updateSummary() {
        const checkedBoxes = document.querySelectorAll('input[name="target_students"]:checked');
        const count = checkedBoxes.length;
        
        // 1. 상단 {{ selector_label|default:"평가 대상" }} 선택 버튼 업데이트
        const summaryElement = document.getElementById('targetSummary');
        const button = document.querySelector('[data-bs-target="#studentSelectModal"]');
        const defaultLabel = button ? button.getAttribute('data-default-label') : '{{ selector_label|default:"평가 대상" }}';
        
        if (summaryElement) {
            if (count > 0) {
                summaryElement.textContent = `👥 ${defaultLabel} 선택 (${count}명)`;
            } else {
                summaryElement.textContent = `👥 ${defaultLabel} 선택`;
            }
        }
        
        // 2. 하단 메인 분석 버튼 내부 대상 표시 업데이트
        const mainBtnCount = document.getElementById('mainBtnCount');
        if (mainBtnCount) {
            mainBtnCount.textContent = count;
        }
    }

    // 선택 완료 시 hidden 필드에 값 설정 (물리적 데이터 전송 브릿지)
    function completeStudentSelection() {
        const checkboxes = document.querySelectorAll('input[name="target_students"]:checked');
        const selectedIds = Array.from(checkboxes).map(cb => cb.value);
        
        // 1) 기존 target_students_data 필드에 콤마로 구분하여 설정
        const hiddenField = document.getElementById('target_students_data');
        if (hiddenField) {
            hiddenField.value = selectedIds.join(',');
        }
        
        // 2) [핵심] JSON 형태로 폼에 강제 주입 (물리적 데이터 전송 브릿지)
        const jsonField = document.getElementById('id_selected_students_json');
        if (jsonField) {
            jsonField.value = JSON.stringify(selectedIds);
            console.log('[브릿지] JSON 필드에 주입된 데이터:', jsonField.value);
        }
        
        console.log('선택된 학생 IDs:', selectedIds);
        console.log('콤마 필드 값:', selectedIds.join(','));
        console.log('JSON 필드 값:', JSON.stringify(selectedIds));

        // 3) [추가] 선택 완료 시 커스텀 이벤트 전송 (학생 명렬표 페이지 등에서 활용)
        const event = new CustomEvent('studentSelectionCompleted', { detail: { selectedIds: selectedIds } });
        document.dispatchEvent(event);
    }

    // 폼 제출 시 데이터 동기화 강제 (글로벌 모달 대응) - 중복 방지를 위해 단일 리스너만 사용
    document.addEventListener("DOMContentLoaded", function() {
        const unifiedForm = document.getElementById('unifiedForm');
        if (unifiedForm) {
            // 기존 onsubmit 핸들러가 있을 수 있으므로 addEventListener로 추가
            unifiedForm.addEventListener('submit', function(e) {
                console.log('[데이터 브릿지] 폼 제출 이벤트 감지됨');
                
                // 폼 제출 직전에 모달 데이터를 다시 동기화
                const checkboxes = document.querySelectorAll('input[name="target_students"]:checked');
                const selectedIds = Array.from(checkboxes).map(cb => cb.value);
                
                console.log('[데이터 브릿지] 선택된 학생 수:', selectedIds.length);
                console.log('[데이터 브릿지] 선택된 학생 IDs:', selectedIds);
                
                const jsonField = document.getElementById('id_selected_students_json');
                if (jsonField) {
                    jsonField.value = JSON.stringify(selectedIds);
                    console.log('[데이터 브릿지] JSON 필드에 주입된 데이터:', jsonField.value);
                } else {
                    console.log('[오류] id_selected_students_json 필드를 찾을 수 없음');
                }
            });
        }
    });

    // 페이지 로드 시 실행
    document.addEventListener("DOMContentLoaded", function() {
        // 모달이 열릴 때 체크 상태 복구
        const studentSelectModal = document.getElementById('studentSelectModal');
        if (studentSelectModal) {
            studentSelectModal.addEventListener('show.bs.modal', function () {
                // 1️⃣ Reset all checkboxes
                document.querySelectorAll('#studentSelectModal input[type="checkbox"]').forEach(cb => cb.checked = false);
                // 2️⃣ Clear search input & show all items
                const searchInput = document.getElementById('modalStudentSearch');
                if (searchInput) { searchInput.value = ''; }
                document.querySelectorAll('#studentSelectModal .student-item').forEach(item => item.style.display = 'flex');
                // 3️⃣ Restore previously selected students if any
                {% if current_targets %}
                    const currentTargets = {{ current_targets|safe }};
                    if (Array.isArray(currentTargets)) {
                        currentTargets.forEach(studentId => {
                            const checkbox = document.getElementById('s_' + studentId);
                            if (checkbox) { checkbox.checked = true; }
                        });
                    }
                {% endif %}
                // 4️⃣ Update summary UI
                updateSummary();
            });
        }
    });

    // 실시간 모달 내 검색 기능
    document.addEventListener("DOMContentLoaded", function() {
        const searchInput = document.getElementById('modalStudentSearch');
        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.trim().toLowerCase();
                const gradeSections = document.querySelectorAll('.grade-section');
                
                gradeSections.forEach(gradeSec => {
                    const gradeLabelEl = gradeSec.querySelector('.parent-check + label');
                    const gradeLabel = gradeLabelEl ? gradeLabelEl.textContent.toLowerCase() : '';
                    const gradeMatches = gradeLabel.includes(query);
                    let gradeVisible = gradeMatches;
                    
                    const classSections = gradeSec.querySelectorAll('.class-section');
                    classSections.forEach(classSec => {
                        const classLabelEl = classSec.querySelector('.group-check + label');
                        const classLabel = classLabelEl ? classLabelEl.textContent.toLowerCase() : '';
                        const classMatches = classLabel.includes(query);
                        let classVisible = classMatches || gradeMatches;
                        
                        const studentItems = classSec.querySelectorAll('.student-item');
                        studentItems.forEach(item => {
                            const studentLabel = item.textContent.toLowerCase();
                            const studentMatches = studentLabel.includes(query);
                            
                            if (studentMatches || classMatches || gradeMatches) {
                                item.style.setProperty('display', 'flex', 'important');
                                classVisible = true;
                            } else {
                                item.style.setProperty('display', 'none', 'important');
                            }
                        });
                        
                        if (classVisible) {
                            classSec.style.setProperty('display', 'block', 'important');
                            gradeVisible = true;
                        } else {
                            classSec.style.setProperty('display', 'none', 'important');
                        }
                    });
                    
                    if (gradeVisible) {
                        gradeSec.style.setProperty('display', 'block', 'important');
                    } else {
                        gradeSec.style.setProperty('display', 'none', 'important');
                    }
                });
            });
        }
    });

    // 1. 모달이 열릴 때 이벤트 리스너 (순수 자바스크립트)
    const myModal = document.getElementById('studentSelectModal');
    
    myModal.addEventListener('shown.bs.modal', function () {
        const colors =['pastel-purple', 'pastel-blue', 'pastel-green', 'pastel-yellow', 'pastel-orange', 'pastel-red', 'pastel-pink'];
        
        // 학년별 구역(grade-section)을 모두 찾습니다
        const gradeSections = document.querySelectorAll('.grade-section');
        
        gradeSections.forEach(section => {
            // 기존에 입혀진 색상 클래스 초기화
            section.classList.remove(...colors);
            
            // 랜덤 색상 할당
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            // 1. 학년 영역에 색상 입히기
            section.classList.add(randomColor, 'p-4', 'rounded-24px', 'mb-4');
            
            // 2. 내부의 '반' 영역(class-section)은 항상 흰색 배경으로 유지
            const classSections = section.querySelectorAll('.class-section');
            classSections.forEach(cls => {
                cls.style.backgroundColor = '#ffffff';
                cls.style.borderRadius = '15px';
                cls.style.padding = '10px';
                cls.style.border = '1px solid #eee';
            });
        });
    });
</script>
