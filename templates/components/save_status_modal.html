<div class="modal fade" id="saveStatusModal" tabindex="-1" aria-labelledby="saveStatusModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered save-status-dialog">
        <div class="modal-content save-status-content border-0">
            <div class="modal-body text-center">
                <div class="save-status-icon mx-auto" id="saveStatusModalIcon" aria-hidden="true">
                    <i class="bi bi-cloud-check-fill"></i>
                </div>
                <h6 class="save-status-title fw-bold mb-0" id="saveStatusModalTitle">임시 저장 완료</h6>
            </div>
        </div>
    </div>
</div>

<style>
    .save-status-dialog {
        width: min(220px, calc(100% - 2rem));
        margin-right: auto;
        margin-left: auto;
    }

    .save-status-content {
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.74) !important;
        box-shadow: 0 16px 38px rgba(33, 37, 41, 0.18);
    }

    .save-status-content .modal-body {
        padding: 1.25rem 1rem;
    }

    .save-status-icon {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        margin-bottom: 0.6rem;
        border-radius: 50%;
        color: #146c43;
        background: rgba(25, 135, 84, 0.13);
        font-size: 1.1rem;
    }

    .save-status-icon-error {
        color: #b02a37 !important;
        background: rgba(220, 53, 69, 0.13) !important;
    }

    .save-status-title {
        font-size: 0.95rem;
        line-height: 1.3;
    }
</style>

<script>
    let saveStatusModalTimer;

    function showSaveStatusModal(isError = false) {
        const modalElement = document.getElementById('saveStatusModal');
        const titleElement = document.getElementById('saveStatusModalTitle');
        const iconElement = document.getElementById('saveStatusModalIcon');
        const modal = bootstrap.Modal.getOrCreateInstance(modalElement);

        titleElement.textContent = isError ? '임시 저장 실패' : '임시 저장 완료';
        iconElement.classList.toggle('save-status-icon-error', isError);
        iconElement.innerHTML = isError
            ? '<i class="bi bi-exclamation-triangle-fill"></i>'
            : '<i class="bi bi-cloud-check-fill"></i>';

        clearTimeout(saveStatusModalTimer);
        modal.show();
        saveStatusModalTimer = setTimeout(() => modal.hide(), isError ? 1800 : 1200);
    }
</script>
