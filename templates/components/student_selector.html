<!-- [스타일] 학생 명단 그리드 및 토글 -->
<style>
    .student-selector-wrapper {
        position: relative;
        z-index: 100;
        margin: 0;
        padding: 0;
    }
    
    .student-selector-wrapper .dropdown-menu {
        position: absolute !important;
        z-index: 2000;
        box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        top: 100%;
        left: 0;
        right: 0;
        min-width: 100%;
        max-height: 600px;
        overflow-y: auto;
        display: none;
    }
    
    .student-selector-wrapper .dropdown-menu.show {
        display: block;
    }
    
    .student-grid-container {
        column-count: 5;
        column-gap: 1rem;
    }
    .student-item {
        break-inside: avoid;
        margin-bottom: 0.5rem;
    }
    .toggle-btn { cursor: pointer; transition: 0.2s; }
    .toggle-btn:hover { background-color: #f8f9fa; }
    .form-check { display: flex; align-items: center; gap: 0.5rem; }
    
    /* 모바일 대응 */
    @media (max-width: 768px) {
        .student-grid-container { column-count: 2; }
    }
</style>

<!-- [UI] 평가 대상 선택 컴포넌트 -->
<div class="student-selector-wrapper">
    <div class="row mb-2 align-items-center">
    <label class="col-md-3 col-form-label fw-bold bg-light text-center border rounded py-1">
        평가 대상 <span class="text-danger">*</span>
    </label>
    <div class="col-md-9">
        <button class="btn btn-outline-secondary w-100 text-start d-flex justify-content-between align-items-center rounded-pill" 
                type="button" data-bs-toggle="modal" data-bs-target="#studentSelectModal"
                data-default-label="{{ selector_label|default:'평가 대상' }}"
                style="background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border: 2px solid #8E44AD; transition: all 0.3s ease;">
            <span id="targetSummary" class="fw-bold" style="color: #8E44AD;">
                {% if current_targets %}
                    👥 {{ selector_label|default:"평가 대상" }} 선택 ({{ current_targets|length }}명)
                {% else %}
                    👥 {{ selector_label|default:"평가 대상" }} 선택
                {% endif %}
            </span>
            <i class="bi bi-people-fill" style="color: #8E44AD;"></i>
        </button>
                </div>
    </div>
</div>

<!-- [Script] 체크박스 제어 로직 -->
<script>
    // 모달 닫고 요약 업데이트
    function closeDropdownAndUpdate() {
        // 모달 닫기
        const modal = bootstrap.Modal.getInstance(document.getElementById('studentSelectModal'));
        if (modal) {
            modal.hide();
        }
        
        // 최종 상태 확정 및 요약 업데이트
        const checkedBoxes = document.querySelectorAll('input[name="target_students"]:checked');
        console.log("선택 완료 - 체크된 학생 수:", checkedBoxes.length);
        
        // 상태 확정 후 요약 업데이트
        updateSummary();
    }

    function updateSummary() {
        const checkedCount = document.querySelectorAll('input[name="target_students"]:checked').length;
        const summaryText = document.getElementById('targetSummary');
        const button = document.querySelector('[data-bs-target="#studentSelectModal"]');
        const label = button ? button.getAttribute('data-default-label') : '평가 대상';
        
        if (checkedCount > 0) {
            summaryText.innerHTML = `<span class="text-primary fw-bold">${checkedCount}명</span> 선택됨`;
        } else {
            summaryText.innerText = `${label} 선택`;
        }
    }
    
    // 페이지 로드 시 실행
    document.addEventListener("DOMContentLoaded", function() {
        // 초기 라벨 적용
        updateSummary();
        
        // 모달이 열릴 때 체크 상태 복구
        const studentSelectModal = document.getElementById('studentSelectModal');
        if (studentSelectModal) {
            studentSelectModal.addEventListener('show.bs.modal', function () {
                // 모달이 열릴 때 기존 선택된 학생들 체크 상태 복구
                {% if current_targets %}
                    const currentTargets = {{ current_targets|safe }};
                    if (Array.isArray(currentTargets)) {
                        currentTargets.forEach(studentId => {
                            const checkbox = document.getElementById('s_' + studentId);
                            if (checkbox) {
                                checkbox.checked = true;
                            }
                        });
                    }
                {% endif %}
                updateSummary(); // 상태 업데이트
            });
        }

</script>
