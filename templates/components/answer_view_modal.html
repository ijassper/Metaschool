<script>
    function openAnswerModal(btnEl) {
        const d = btnEl.dataset;
        
        let studentInfo = d.studentInfo;
        const name = d.studentName || d.name;
        if (!studentInfo && name) {
            studentInfo = `${d.grade || ''}학년 ${d.classNo || ''}반 ${d.number || ''}번 ${name}`.trim();
        }

        openIngridModal({
            title: d.modalTitle || '학생 답안지',
            schoolName: d.schoolName || '학교 정보 없음',
            studentInfo: studentInfo || '학생 정보 없음',
            submittedAt: d.submittedAt || d.submitted || '-',
            questionContent: d.questionContent,
            content: d.answerContent,
            contentType: d.contentType || 'answer',
            showPdfBtn: d.showPdfBtn !== 'false',
            showQuestion: d.showQuestion !== 'false',
            name: d.name || d.studentName,
            grade: d.grade,
            classNo: d.classNo,
            number: d.number
        });
    }

    function openIngridModal(options) {
        const {
            title = '학생 답안지',
            schoolName = '학교 정보 없음',
            studentInfo = '',
            submittedAt = '-',
            questionContent = '',
            content = '',
            contentType = 'answer',
            showPdfBtn = true,
            showQuestion = true
        } = options;

        window.currentAnswerModalData = {
            name: options.name || '',
            grade: options.grade || '',
            classNo: options.classNo || '',
            number: options.number || '',
            submittedAt,
            questionContent,
            answerContent: content,
            schoolName
        };

        document.getElementById('answerModalHeaderTitle').innerText = title;
        document.getElementById('modalSchoolName').innerText = schoolName;
        document.getElementById('modalStudentInfo').innerText = studentInfo;
        document.getElementById('modalSubmittedAt').innerText = submittedAt;
        
        const qSection = document.getElementById('modalQuestionSection');
        if (showQuestion) {
            qSection.style.display = 'block';
            document.getElementById('modalQuestionContent').innerText = questionContent || "문항 정보가 없습니다.";
        } else {
            qSection.style.display = 'none';
        }

        const contentLabel = document.getElementById('answerModalContentLabel');
        if (contentType === 'ai') {
            contentLabel.innerText = 'AI 분석 결과';
            contentLabel.classList.replace('text-primary', 'text-success');
            document.getElementById('answerPdfBtn').style.display = 'none';
        } else {
            contentLabel.innerText = '작성한 답안';
            contentLabel.classList.replace('text-success', 'text-primary');
            document.getElementById('answerPdfBtn').style.display = showPdfBtn ? 'inline-flex' : 'none';
        }

        renderAnswerContent(document.getElementById('modalAnswerContent'), content, contentType);
        
        const modal = new bootstrap.Modal(document.getElementById('answerViewModal'));
        modal.show();
    }

    document.addEventListener('DOMContentLoaded', function() {
        const modalEl = document.getElementById('answerViewModal');
        if (modalEl) {
            modalEl.addEventListener('hidden.bs.modal', function() {
                document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
                document.body.classList.remove('modal-open');
                document.body.style.overflow = '';
                document.body.style.paddingRight = '';
                const modalBackdrop = document.querySelector('.modal-backdrop');
                if (modalBackdrop) modalBackdrop.remove();
            });
        }
    });

    function escapeHtml(value) {
        return (value || '').toString()
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function renderAnswerContent(container, content, contentType) {
        const normalizedContent = (content || '').toString().replace(/\r\n?/g, '\n');
        container.replaceChildren();

        if (!normalizedContent.trim()) {
            container.innerText = "내용이 없습니다.";
            return;
        }

        if (contentType === 'ai') {
            container.innerText = normalizedContent;
            return;
        }

        const lines = normalizedContent.split('\n');
        let textLines = [];

        const appendText = () => {
            const text = textLines.join('\n').replace(/^\n+|\n+$/g, '');
            textLines = [];
            if (!text) return;

            const textElement = document.createElement('div');
            textElement.className = 'answer-content-text';
            textElement.innerText = text;
            container.appendChild(textElement);
        };

        lines.forEach((line) => {
            const titleMatch = line.match(/^\s*\[([^\]]*)\]\s*$/);
            if (!titleMatch) {
                textLines.push(line);
                return;
            }

            appendText();
            const title = titleMatch[1].trim();
            if (!title) return;

            const titleElement = document.createElement('div');
            titleElement.className = 'answer-content-title font-bold fw-bold';
            titleElement.innerText = title;
            container.appendChild(titleElement);
        });

        appendText();
    }

    function formatPrintAnswerContent(content) {
        const normalizedContent = (content || '').toString().replace(/\r\n?/g, '\n');
        if (!normalizedContent.trim()) return escapeHtml('내용 없음');

        const lines = normalizedContent.split('\n');
        const chunks = [];
        let textLines = [];

        const appendText = () => {
            const text = textLines.join('\n').replace(/^\n+|\n+$/g, '');
            textLines = [];
            if (!text) return;
            chunks.push(`<div class="print-answer-text">${escapeHtml(text)}</div>`);
        };

        lines.forEach((line) => {
            const titleMatch = line.match(/^\s*\[([^\]]*)\]\s*$/);
            if (!titleMatch) {
                textLines.push(line);
                return;
            }

            appendText();
            const title = titleMatch[1].trim();
            if (!title) return;
            chunks.push(`<div class="print-answer-title">${escapeHtml(title)}</div>`);
        });

        appendText();
        return chunks.join('');
    }

    function savePdf() {
        if (!window.currentAnswerModalData) return;
        const data = window.currentAnswerModalData;
        
        const grade = (data.grade || '').toString();
        const classNo = (data.classNo || '').toString().padStart(2, '0');
        const number = (data.number || '').toString().padStart(2, '0');
        const name = (data.name || '').toString().trim();
        const submittedDate = (data.submittedAt || '').toString().slice(0, 10) || '';
        const formattedDate = submittedDate ? submittedDate.replace(/-/g, '') : '날짜없음';
        const safeName = name.replace(/[\\/:*?"<>|]/g, '');
        const printTitle = `${grade}${classNo}${number}${safeName}_답안지_${formattedDate}`;
        
        const originalTitle = document.title;
        const iframe = document.createElement('iframe');
        iframe.style.position = 'absolute';
        iframe.style.left = '-9999px';
        iframe.style.top = '-9999px';
        iframe.style.width = '0px';
        iframe.style.height = '0px';
        iframe.style.border = 'none';
        document.body.appendChild(iframe);
        
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        const htmlContent = `
            <!DOCTYPE html>
            <html lang="ko">
            <head>
                <meta charset="UTF-8">
                <title>${escapeHtml(printTitle)}</title>
                <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
                <style>
                    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
                    @page { size: A4; margin: 12mm; }
                    body { font-family: 'Noto Sans KR', sans-serif; padding: 20px; line-height: 1.55; color: #111; }
                    .print-sheet { width: 100%; max-width: 186mm; margin: 0 auto; }
                    .print-title { font-size: 18px; font-weight: 700; text-align: center; margin: 0 0 12px; }
                    
                    .print-meta {
                        display: flex;
                        justify-content: space-between;
                        align-items: flex-start;
                        border: 1px solid #dee2e6;
                        background-color: #f8f9fa;
                        border-radius: 16px;
                        padding: 14px 18px;
                        margin-bottom: 1.5rem;
                        font-size: 10pt;
                        -webkit-print-color-adjust: exact !important;
                        print-color-adjust: exact !important;
                    }
                    .print-meta-left,
                    .print-meta-right {
                        display: flex;
                        gap: 8px;
                        align-items: center;
                        line-height: 1.5;
                    }
                    .print-meta-left {
                        color: #6c757d;
                        flex: 0 0 auto;
                    }
                    .print-meta-right {
                        justify-content: flex-end;
                        text-align: right;
                        font-weight: 700;
                        flex: 1 1 auto;
                        white-space: nowrap;
                    }
                    .print-meta-label { font-weight: 700; color: #495057; }
                    .print-meta-divider { margin: 0 4px; color: #adb5bd; }
                    
                    .print-section {
                        margin-bottom: 16px;
                        page-break-inside: auto;
                        break-inside: auto;
                    }
                    .print-section-title { font-size: 11pt; font-weight: 700; margin: 0 0 8px; }
                    .text-primary { color: #8E44AD !important; }
                    .text-secondary { color: #6c757d !important; }
                    .print-question-panel,
                    .bg-gray-50 {
                        background-color: #f9fafb !important;
                        border: 1px solid #e9ecef;
                        -webkit-print-color-adjust: exact !important;
                        print-color-adjust: exact !important;
                    }
                    .rounded-xl {
                        border-radius: 12px !important;
                    }
                    .p-4 {
                        padding: 16px !important;
                    }
                    .print-question {
                        font-size: 9pt;
                        font-weight: normal;
                        white-space: pre-wrap;
                        color: #212529;
                        line-height: 1.55;
                    }
                    
                    .print-box {
                        border: 1px solid #dee2e6;
                        background-color: #ffffff;
                        border-radius: 12px;
                        padding: 16px;
                        white-space: pre-wrap;
                        margin-bottom: 14px;
                        font-size: 10pt;
                        line-height: 1.65;
                        page-break-inside: auto;
                        break-inside: auto;
                        box-decoration-break: clone;
                        -webkit-box-decoration-break: clone;
                        -webkit-print-color-adjust: exact !important;
                        print-color-adjust: exact !important;
                    }
                    .print-box::before, .print-box::after { content: ""; display: block; height: 0; }
                    .print-answer { min-height: 0; }
                    .print-answer-title { font-weight: 700; margin: 0 0 0.35rem; }
                    .print-answer-text + .print-answer-title { margin-top: 1rem; }
                    .print-answer-text { white-space: pre-wrap; }
                    @media print {
                        body { padding: 0; }
                        .print-sheet { padding: 0; }
                        .print-meta {
                            display: flex !important;
                            justify-content: space-between !important;
                            align-items: flex-start !important;
                            flex-direction: row !important;
                        }
                        .print-meta-left,
                        .print-meta-right {
                            display: flex !important;
                            align-items: center !important;
                        }
                        .print-meta-right {
                            justify-content: flex-end !important;
                            text-align: right !important;
                            white-space: nowrap !important;
                        }
                        .print-question-panel,
                        .print-box {
                            -webkit-print-color-adjust: exact !important;
                            print-color-adjust: exact !important;
                        }
                        .print-question-panel {
                            background-color: #f9fafb !important;
                            border: 1px solid #e9ecef !important;
                            border-radius: 12px !important;
                            padding: 16px !important;
                            margin-bottom: 16px !important;
                        }
                        .print-question {
                            font-size: 9pt !important;
                            font-weight: normal !important;
                        }
                        .print-box { page-break-inside: auto; break-inside: auto; }
                    }
                </style>
            </head>
            <body>
                <div class="print-sheet">
                    <h1 class="print-title">학 생 답 안 지</h1>
                    <div class="print-meta">
                        <div class="print-meta-left">
                            <span class="print-meta-label">제출일시</span>
                            <span>${escapeHtml(data.submittedAt)}</span>
                        </div>
                        <div class="print-meta-right">
                            <span>${escapeHtml(data.schoolName)}</span>
                            <span class="print-meta-divider">|</span>
                            <strong>${escapeHtml(`${grade}학년 ${data.classNo}반 ${data.number}번 ${name}`)}</strong>
                        </div>
                    </div>
                    <div class="print-section print-question-panel bg-gray-50 rounded-xl p-4">
                        <h2 class="print-section-title text-secondary">평가 문항</h2>
                        <div class="print-question">${escapeHtml(data.questionContent || '문항 정보 없음')}</div>
                    </div>
                    <div class="print-section">
                        <h2 class="print-section-title">작성한 답안</h2>
                        <div class="print-box print-answer">${formatPrintAnswerContent(data.answerContent)}</div>
                    </div>
                </div>
            </body>
            </html>
        `;
        
        iframeDoc.open();
        iframeDoc.write(htmlContent);
        iframeDoc.close();
        
        iframe.onload = function() {
            document.title = printTitle;
            setTimeout(function() {
                iframe.contentWindow.print();
                setTimeout(function() {
                    document.title = originalTitle;
                    document.body.removeChild(iframe);
                }, 1000);
            }, 500);
        };
    }
</script>
