{% extends 'registration/auth_base.html' %}

{% block auth_form %}
    <h2 class="fw-bold mb-5">로그인</h2>
    
    <form method="post" action="{% url 'login' %}" id="loginForm">
        {% csrf_token %}
        
        <div class="role-selector shadow-sm">
            <input type="radio" name="login_type" id="type_student" value="student" checked>
            <label for="type_student">학생</label>
            <input type="radio" name="login_type" id="type_teacher" value="teacher">
            <label for="type_teacher">교사</label>
        </div>

        <label class="field-label fw-bold small text-muted mb-2 d-block" id="label_username">학생 ID</label>
        <input type="text" name="username" class="form-input" id="id_username" placeholder="학생 ID를 입력하세요" required autocomplete="off">

        <label class="field-label fw-bold small text-muted mb-2 d-block">비밀번호</label>
        <input type="password" name="password" class="form-input" id="id_password" placeholder="비밀번호를 입력하세요" required>

        <div class="d-flex justify-content-between mb-5 px-1">
            <div class="form-check d-flex align-items-center gap-2">
                <input class="form-check-input" type="checkbox" name="remember_me" id="rememberMe" style="width: 1.1rem; height: 1.1rem;">
                <label class="form-check-label text-secondary small" for="rememberMe">로그인 유지</label>
            </div>
            <a href="#" class="text-primary small text-decoration-none">비밀번호 찾기</a>
        </div>

        <button type="submit" class="btn-ingrid-submit">로그인</button>
    </form>

    <!-- [핵심] 교사일 때만 가입 링크 노출되는 영역 -->
    <div id="teacher-signup-area" class="text-center mt-5 small" style="display: none;">
        <span class="text-secondary">계정이 없으신가요?</span>
        <a href="{% url 'signup' %}" id="signup-link" class="fw-bold text-primary ms-2 text-decoration-none">교사 회원가입</a>
    </div>
{% endblock %}
